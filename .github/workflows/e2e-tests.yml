name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: true

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Correr tests E2E
        run: npm test

      - name: Publicar reporte de Allure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 14

      - name: Publicar capturas de pantalla de fallos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: '**/*.png'
          retention-days: 14
